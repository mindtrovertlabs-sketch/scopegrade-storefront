<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Scopegrade logo</title>
  <desc id="desc">Scopegrade SG mark for directory listings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14222a"/>
      <stop offset="1" stop-color="#1e7870"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="56" fill="url(#bg)"/>
  <circle cx="256" cy="238" r="174" fill="none" stroke="#b9f4e6" stroke-width="14"/>
  <text x="256" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="152" font-weight="700" fill="#f6faf8">SG</text>
  <text x="256" y="400" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" fill="#b9f4e6">Scopegrade</text>
</svg>
